name: IobBot Controller Starter

on:
  workflow_call:
    inputs:
      wait_minutes:
        description: 'Time to wait in minutes between controller runs'
        type: number
        default: 10

  workflow_dispatch:
    inputs:
      wait_minutes:
        description: 'Time to wait in minutes between controller runs'
        type: string
        default: '10'

  schedule:
    # * is a special character in YAML, so you have to quote this string
    # every day at 0:30
    - cron: '30 0 * * *'

concurrency:
  group: iobbot-controller-starter
  cancel-in-progress: false

jobs:
  iobbot-controller-starter:
    name: iobbot controller starter
    if: |
      github.repository == 'iobroker-bot-orga/iobbot-controller'

    runs-on: ubuntu-latest

    permissions:
      actions: write

    steps:
      - name: Run controller in loop for ~3 hours then restart
        run: |
          WAIT_MINUTES_INPUT="${{ inputs.wait_minutes }}"
          WAIT_MINUTES=${WAIT_MINUTES_INPUT:-10}
          WAIT_SECONDS=$((WAIT_MINUTES * 60))
          THREE_HOURS_IN_SECONDS=10800
          CYCLES=$((THREE_HOURS_IN_SECONDS / WAIT_SECONDS))

          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") Starting loop: $CYCLES cycles of $WAIT_MINUTES minutes each (~3 hours total)"

          for i in $(seq 1 "$CYCLES"); do
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") Cycle $i/$CYCLES: waiting $WAIT_MINUTES minutes..."
            sleep "$WAIT_SECONDS"
            echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") Cycle $i/$CYCLES: triggering iobbotController.yml..."
            gh workflow run iobbotController.yml --repo iobroker-bot-orga/iobbot-controller || echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") Warning: failed to trigger iobbotController.yml in cycle $i"
          done

          echo "$(date -u +"%Y-%m-%dT%H:%M:%SZ") 3 hours completed. Restarting starter workflow..."
          gh workflow run iobbotControllerStarter.yml --repo iobroker-bot-orga/iobbot-controller -f wait_minutes="$WAIT_MINUTES"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
